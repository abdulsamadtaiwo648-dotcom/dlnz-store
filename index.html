<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DLNZ Store - Premium Street Fashion" />
  <title>DLNZ Store - Premium Street Fashion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <h1>🔴 DLNZ STORE</h1>
        <p>Premium Street Fashion</p>
      </div>
      <button onclick="openCart()" class="cart-btn">
        🛒 Cart <span id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Filters & Sort -->
    <section class="controls">
      <div class="filters">
        <button class="filter-btn active" onclick="filterProducts('all')">All Products</button>
        <button class="filter-btn" onclick="filterProducts('hoodie')">Hoodies</button>
        <button class="filter-btn" onclick="filterProducts('tshirt')">T-Shirts</button>
        <button class="filter-btn" onclick="filterProducts('jacket')">Jackets</button>
      </div>

      <div class="sort">
        <select onchange="sortProducts(this.value)" class="sort-select">
          <option value="default">Sort By</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
      </div>
    </section>

    <!-- Products Grid -->
    <section class="products">
      <div id="emptyState" class="empty-state" style="display: none">
        <p>😢 No products found</p>
      </div>
      <div id="productsContainer" class="products-grid"></div>
    </section>
  </main>

  <!-- Cart Overlay -->
  <div id="cartOverlay" class="cart-overlay" onclick="closeCart()"></div>

  <!-- Cart Sidebar -->
  <div id="cart" class="cart">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <div id="emptyCart" class="empty-cart" style="display: none">
      <p>🛒 Your cart is empty</p>
    </div>

    <div id="cartItems" class="cart-items"></div>

    <!-- Cart Summary -->
    <div id="checkoutForm" class="checkout-form" style="display: none">
      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span>₦<span id="subtotal">0</span></span>
        </div>
        <div class="summary-row">
          <span>Shipping:</span>
          <span>₦<span id="shipping">0</span></span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span>₦<span id="total">0</span></span>
        </div>
      </div>

      <!-- Checkout Form -->
      <form>
        <input
          type="text"
          id="name"
          placeholder="Full Name"
          required
        />
        <input
          type="email"
          id="email"
          placeholder="Email Address"
          required
        />
        <input
          type="tel"
          id="phone"
          placeholder="Phone Number"
          required
        />
        <textarea
          id="address"
          placeholder="Delivery Address"
          rows="3"
          required
        ></textarea>
        <button type="submit" class="checkout-btn">Place Order</button>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="modal-icon">✅</div>
      <h2>Order Confirmed!</h2>
      <pre id="orderMessage" class="order-message"></pre>
      <button onclick="closeSuccessModal()" class="modal-btn">Continue Shopping</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
